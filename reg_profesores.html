<head>

        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</head>

<body>


    <header>
        <nav class="navbar navbar-expand-lg bg-body-tertiary">
            <div class="container-fluid">
                <a class="navbar-brand" href="index.html">IE- AA</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                    data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent"
                    aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarSupportedContent">
                    <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                        <li class="nav-item">
                            <a class="nav-link active" aria-current="page" href="index.html">Inicio</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="reg_estudiantes.html">Registro Estudiantes</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="reg_profesores.html">Registro Profesores</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="reg_asistencia.html">Registro Asistencia</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="reg_notas.html">Registro Notas</a>
                        </li>
                    </ul>
                    <form class="d-flex" role="search">
                        <input class="form-control me-2" type="search" placeholder="Search" aria-label="Search" />
                        <button class="btn btn-outline-success" type="submit">Search</button>
                    </form>
                </div>
            </div>
        </nav>
    </header>

    <div class="container my-5">
        <div class="bg-secondary text-dark text-center py-3 mb-5 border-bottom border-dark">
            <h2 class="fw-bold mb-0">Registro Profesores</h2>
        </div>

        <form class="mx-auto" style="max-width: 700px;">

            <div class="row mb-4 align-items-center">
                <label for="correo" class="col-sm-4 col-form-label text-sm-end text-start">Correo:</label>
                <div class="col-sm-8">
                    <input type="email" class="form-control py-2" id="correo" placeholder="Ingresar correo" required>
                </div>
            </div>

            <div class="row mb-4 align-items-center">
                <label for="nombre" class="col-sm-4 col-form-label text-sm-end text-start">Nombre:</label>
                <div class="col-sm-8">
                    <input type="text" class="form-control py-2" id="nombre" placeholder="Ingrese su nombre " required>
                </div>
            </div>

            <div class="row mb-4 align-items-center">
                <label for="apellido" class="col-sm-4 col-form-label text-sm-end text-start">Apellido:</label>
                <div class="col-sm-8">
                    <input type="text" class="form-control py-2" id="apellido" placeholder="Ingrese sus apellidos"
                        required>
                </div>
            </div>

            <div class="row mb-4 align-items-center">
                <label for="documento" class="col-sm-4 col-form-label text-sm-end text-start">Número de
                    Documento:</label>
                <div class="col-sm-8">
                    <input type="text" class="form-control py-2" id="documento"
                        placeholder="Ingrese su número de documento" required>
                </div>
            </div>



            <div class="text-center">
                <button type="submit" class="btn btn-secondary text-dark border-dark px-4 py-2 fw-semibold shadow-sm">
                    Registrar Profesor
                </button>
            </div>

        </form>
    </div>

    <footer class="bg-secondary text-white text-center py-4 mt-auto">
        <div class="container">
            <p class="mb-0">&copy; Todos los derechos reservados</p>
        </div>
    </footer>


</body>

</html>
