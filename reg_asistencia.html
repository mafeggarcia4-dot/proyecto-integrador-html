<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</head>

<body>

    <header>
        <nav class="navbar navbar-expand-lg bg-body-tertiary">
            <div class="container-fluid">
                <a class="navbar-brand" href="index.html">IE- AA</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                    data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent"
                    aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarSupportedContent">
                    <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                        <li class="nav-item">
                            <a class="nav-link active" aria-current="page" href="index.html">Inicio</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="reg_estudiantes.html">Registro Estudiantes</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="reg_profesores.html">Registro Profesores</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="reg_asistencia.html">Registro Asistencia</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="reg_notas.html">Registro Notas</a>
                        </li>
                    </ul>
                    <form class="d-flex" role="search">
                        <input class="form-control me-2" type="search" placeholder="Search" aria-label="Search" />
                        <button class="btn btn-outline-success" type="submit">Search</button>
                    </form>
                </div>
            </div>
        </nav>
    </header>

    <section class="container my-5">
        <section class="bg-secondary text-dark text-center py-3 mb-5 border-bottom border-dark">
            <h2 class="fw-bold mb-0">Registro Asistencia</h2>
        </section>





        <section class="container px-3">
            <section class="card-formulario shadow-sm">
                <form>

                    <div class="mb-4">
                        <label for="nombreEstudiante" class="form-label">Nombre del Estudiante</label>
                        <input type="text" class="form-control" id="nombreEstudiante" placeholder="Ingrese el nombre"
                            required>
                    </div>

                    <div class="mb-4">
                        <label for="numDocumento" class="form-label">Número de Documento</label>
                        <input type="text" class="form-control" id="numDocumento" placeholder="Ingrese el documento"
                            required>
                    </div>

                    <div class="mb-4">
                        <label for="fechaAsistencia" class="form-label">Fecha</label>
                        <input type="date" class="form-control" id="fechaAsistencia" required>
                    </div>

                    <div class="mb-4">
                        <label for="estadoAsistencia" class="form-label">Estado de Asistencia</label>
                        <select class="form-select" id="estadoAsistencia" required>
                            <option value="presente" selected>Presente</option>
                            <option value="ausente">Ausente</option>
                            <option value="tarde">Tarde</option>
                        </select>
                    </div>

                    <div class="mb-4">
                        <label for="observaciones" class="form-label">Observaciones</label>
                        <textarea class="form-control" id="observaciones" rows="4"
                            placeholder="Escriba alguna observación"></textarea>
                    </div>

                    <section class="text-center mt-4">
                        <button class="btn btn-primary" type="submit" value="Submit">Guardar Asistencia</button>
                    </section>

                </form>
            </section>
        </section>

        <br>
        <br>


        <footer class="bg-secondary text-white text-center py-4 mt-auto">
            <div class="container">
                <p class="mb-0">&copy; Todos los derechos reservados</p>
            </div>
        </footer>



</body>

</html>
